# 生产部署编排：web(nginx) 对外提供 80 端口并反代 /api 与 /uploads 到 server；db 提供 PostgreSQL。
# 使用前先复制 server/.env.example 为 .env 并填好必填项（见 docs/deployment.md）。
services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # PostgreSQL 由下方 db 服务提供，凭据统一在 .env 中配置
      DATABASE_URL: postgresql://${POSTGRES_USER:-devcareer}:${POSTGRES_PASSWORD:?请在 .env 中配置数据库密码 POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-devcareer}
      PORT: '3000'
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?请在 .env 中配置至少 32 位的随机密钥}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      AI_API_KEY: ${AI_API_KEY:?请在 .env 中配置 AI 服务的 API Key}
      AI_BASE_URL: ${AI_BASE_URL:?请在 .env 中配置 AI 服务地址}
      AI_MODEL_FAST: ${AI_MODEL_FAST:?请在 .env 中配置 fast 模型}
      AI_MODEL_QUALITY: ${AI_MODEL_QUALITY:?请在 .env 中配置 quality 模型}
      AI_SEND_THINKING: ${AI_SEND_THINKING:-false}
      # 同源部署（nginx 反代）无需配置 CORS_ORIGIN；跨域部署时在 .env 中设置
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    volumes:
      - server-uploads:/app/server/uploads
    depends_on:
      # 等 db 健康后再启动，否则启动时的 prisma migrate deploy 会因连不上库而失败
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/auth/me').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devcareer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中配置数据库密码 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-devcareer}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      # $$ 转义防止 compose 提前插值，让变量在容器内解析
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - server

volumes:
  db-data:
  server-uploads:
